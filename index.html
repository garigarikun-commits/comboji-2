const showWinPanel=()=>{const puzzle=getCurrentPuzzle();document.getElementById("winEmoji").textContent=puzzle.target;document.getElementById("winTitle").textContent=T[LANG].comboOk;document.getElementById("winScore").textContent=T[LANG].score(score);document.getElementById("winPanel").classList.add("show")};const showLosePanel=()=>{if(isSpeedrun)stopChrono();document.getElementById("loseScore").textContent=T[LANG].loseScore(score);document.getElementById("losePanel").classList.add("show")};const showLevelPanel=levelNum=>{document.getElementById("levelTitle").textContent=(LANG==="fr"?"Niveau ":"Level ")+levelNum+(LANG==="fr"?" débloqué !":" unlocked!");document.getElementById("levelSubtitle").textContent=getLevelSubtitle(levelNum);document.getElementById("levelPanel").classList.add("show")};const soundVictory=()=>[523,659,784,1046,880,1046].forEach((note,index)=>setTimeout(()=>playTone(note,"sine",index===5?.55:.18,.28),index*150));
function nextPuzzle(){document.getElementById("winPanel").classList.remove("show");currentPuzzleIndex+=1;if(LEVEL_BREAKS.includes(currentPuzzleIndex)){showLevelPanel(getLevelNumber(currentPuzzleIndex));return}if(currentPuzzleIndex>=PUZZLES.length){soundVictory();spawnFireworks();let timeText="",recordText="";if(isSpeedrun){stopChrono();timeText=`\n⏱️ ${formatTime(chronoSeconds)}`;if(bestTime===null||chronoSeconds<bestTime){bestTime=chronoSeconds;localStorage.setItem("comboji2_best_time",String(bestTime));recordText=LANG==="fr"?"\n🥇 Nouveau record !":"\n🥇 New record!"}}document.getElementById("winEmoji").textContent="🏆";document.getElementById("winTitle").textContent=T[LANG].allDone;document.getElementById("winScore").textContent=T[LANG].finalScore(score,PUZZLES.length)+timeText+recordText;document.getElementById("shareBtn").style.display="inline-flex";document.getElementById("continueBtn").textContent=T[LANG].restart;document.getElementById("winPanel").classList.add("show");return}gameOver=false;document.getElementById("message").textContent="";updateLives();loadPuzzle();window.scrollTo({top:0,left:0,behavior:"smooth"})}
function resetGame(){stopChrono();document.body.classList.add("game-override");document.getElementById("chronoDisplay").style.display="none";isSpeedrun=false;PUZZLES=genererPartie();currentPuzzleIndex=0;score=0;livesLeft=MAX_LIVES;gameOver=false;document.getElementById("winPanel").classList.remove("show");document.getElementById("losePanel").classList.remove("show");document.getElementById("levelPanel").classList.remove("show");document.getElementById("shareBtn").style.display="none";document.getElementById("continueBtn").textContent=T[LANG].continue;document.getElementById("message").textContent="";updateLives();loadPuzzle();window.scrollTo({top:0,left:0,behavior:"auto"})}
function goHome(){stopChrono();isSpeedrun=false;gameOver=false;slots=[];document.body.classList.remove("game-override");document.getElementById("game").style.display="none";document.getElementById("titleScreen").style.display="flex";document.getElementById("winPanel").classList.remove("show");document.getElementById("losePanel").classList.remove("show");document.getElementById("levelPanel").classList.remove("show");document.getElementById("shareBtn").style.display="none";document.getElementById("continueBtn").textContent=T[LANG].continue;document.getElementById("chronoDisplay").style.display="none";document.getElementById("message").textContent="";window.scrollTo({top:0,left:0,behavior:"smooth"})}
function loadPuzzle(){const puzzle=getCurrentPuzzle();document.getElementById("targetEmoji").textContent=puzzle.target;document.getElementById("hintBox").textContent=`${T[LANG].hint} : ${puzzle.hint[LANG]}`;updateDifficultyUi(puzzle);slots=new Array(puzzle.solution.length).fill(null);buildGrid();buildSlots();updateValidateBtn()}
function applyTranslations(){document.getElementById("creditBy").textContent=T[LANG].creditBy;document.getElementById("playBtn").textContent=T[LANG].playBtn;document.getElementById("speedrunBtn").textContent=T[LANG].speedrunBtn;document.getElementById("targetLabel").textContent=T[LANG].targetLabel;document.getElementById("validateBtn").textContent=T[LANG].validate;document.getElementById("continueBtn").textContent=T[LANG].continue;document.getElementById("restartBtn").textContent=T[LANG].restart;document.getElementById("shareBtn").textContent=T[LANG].share;document.getElementById("losePanelTitle").textContent=T[LANG].lost;document.getElementById("levelContinueBtn").textContent=T[LANG].continue}
document.getElementById("validateBtn").addEventListener("click",validate);document.getElementById("continueBtn").addEventListener("click",()=>{currentPuzzleIndex>=PUZZLES.length?resetGame():nextPuzzle()});document.getElementById("restartBtn").addEventListener("click",resetGame);document.getElementById("levelContinueBtn").addEventListener("click",()=>{document.getElementById("levelPanel").classList.remove("show");gameOver=false;document.getElementById("message").textContent="";updateLives();loadPuzzle();window.scrollTo({top:0,left:0,behavior:"smooth"})});document.getElementById("shareBtn").addEventListener("click",async()=>{const text=T[LANG].shareText(score,PUZZLES.length);if(navigator.share){await navigator.share({text});return}await navigator.clipboard.writeText(text);alert(T[LANG].clipboardMsg)});document.getElementById("playBtn").addEventListener("click",()=>startGame(false));document.getElementById("speedrunBtn").addEventListener("click",()=>startGame(true));document.getElementById("homeBtn").addEventListener("click",goHome);document.getElementById("gameLogo").addEventListener("click",goHome);applyTranslations();
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("./sw.js?v=7").then(reg=>reg.update()).catch(()=>{})})}
</script>
</body>
